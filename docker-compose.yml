services:
  # Banco de Dados
  db:
    image: postgres:15
    container_name: p-wallet-db
    environment:
      POSTGRES_DB: ProjLabProg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ProjLabProg"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (Java Spring Boot)
  backend:
    build: ./backend
    container_name: p-wallet-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ProjLabProg
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  # Frontend (React)
  frontend:
    build: ./frontend
    container_name: p-wallet-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
